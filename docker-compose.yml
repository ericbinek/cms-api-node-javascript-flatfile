name: cms-api-node-javascript-flatfile

services:
  app:
    container_name: cms-api-node-javascript-flatfile
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      PORT: "3000"
      DATA_DIR: /app/data
      ADMIN_USER: "${ADMIN_USER:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      RATE_LIMIT_READ_PER_MINUTE: "${RATE_LIMIT_READ_PER_MINUTE:-600}"
      RATE_LIMIT_WRITE_PER_MINUTE: "${RATE_LIMIT_WRITE_PER_MINUTE:-60}"
